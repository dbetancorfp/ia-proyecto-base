name: Deploy Application

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
      branch:
        description: 'Branch or tag to deploy (defaults to main)'
        required: false
        default: 'main'

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  pre-deploy-checks:
    name: Pre-deploy checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: apppassword
          POSTGRES_DB: appdb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://appuser:apppassword@localhost:5432/appdb_test
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma migrations
        run: npm run prisma:migrate:deploy

      - name: Run unit tests (Vitest)
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (Playwright)
        run: npm run test:e2e

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: pre-deploy-checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NUXT_PUBLIC_APP_NAME: ${{ secrets.NUXT_PUBLIC_APP_NAME }}
          NODE_ENV: production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.event.inputs.environment }}
          path: .output/
          retention-days: 1

  deploy:
    name: Deploy to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.event.inputs.environment }}
          path: .output/

      # ── TODO: replace this step with your hosting provider ──────────────────
      # Examples:
      #
      # Fly.io:
      #   uses: superfly/flyctl-actions/setup-flyctl@master
      #   run: flyctl deploy --remote-only
      #   env:
      #     FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      #
      # Railway:
      #   run: railway up --service my-service
      #   env:
      #     RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      #
      # SSH to VPS:
      #   run: |
      #     rsync -avz .output/ user@host:/app/
      #     ssh user@host "cd /app && pm2 restart app"
      #
      # ────────────────────────────────────────────────────────────────────────
      - name: Deploy (configure for your hosting provider)
        run: echo "TODO — replace this step with your hosting provider deploy command"

      - name: Health check
        run: |
          sleep 10
          curl -f ${{ secrets.APP_URL }}/api/health || exit 1

openapi: 3.0.0
info:
  title: "{Your App Name} API"  # TODO: replace with your app name
  description: |
    REST API served by the Nuxt 4 server layer (Nitro/H3).

    All routes are prefixed with `/api/` as per Nuxt convention.
    Routes are defined as files under `server/api/` and auto-registered by Nitro.

    ## Conventions
    - All responses wrapped in `{ data: ... }` for single resources
    - Collections return `{ data: [...], meta: { total, page, limit } }`
    - Errors follow H3 `createError()` format: `{ statusCode, statusMessage, data? }`
    - All endpoints require authentication unless marked as public

  version: 1.0.0
  contact:
    name: Development Team

servers:
  - url: http://localhost:3000
    description: Development (Nuxt dev server — frontend + API unified)
  - url: https://your-app.com  # TODO: replace with your production URL
    description: Production

# ─────────────────────────────────────────────
# Replace the example paths below with your own
# endpoints as you build them.
# ─────────────────────────────────────────────

paths:

  # ── Health check ──────────────────────────
  /api/health:
    get:
      summary: Health check
      description: Returns 200 if the server is running. Used by CI and load balancers.
      tags:
        - Health
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  # ── Example resource: Users ───────────────
  /api/users:
    get:
      summary: List users
      tags:
        - Users
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - in: query
          name: search
          schema:
            type: string
          description: Filter by name or email
      responses:
        '200':
          description: Paginated user list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      summary: Create user
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserInput'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '422':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/users/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer

    get:
      summary: Get user by ID
      tags:
        - Users
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      summary: Update user
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserInput'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

    delete:
      summary: Delete user (soft delete)
      tags:
        - Users
      responses:
        '204':
          description: User deleted
        '404':
          $ref: '#/components/responses/NotFound'

# ─────────────────────────────────────────────
components:
  schemas:

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Alice Smith
        email:
          type: string
          format: email
          example: alice@example.com
        createdAt:
          type: string
          format: date-time

    CreateUserInput:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
          example: Alice Smith
        email:
          type: string
          format: email
          example: alice@example.com

    UpdateUserInput:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        email:
          type: string
          format: email

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
          example: 42
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10

    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
        statusMessage:
          type: string
        data:
          type: object
          description: Additional error details (e.g. Valibot validation issues)

  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            statusCode: 401
            statusMessage: Unauthorized

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            statusCode: 404
            statusMessage: User not found

    ValidationError:
      description: Validation failed (Valibot)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            statusCode: 422
            statusMessage: Validation failed
            data:
              issues: [{ message: 'Invalid email', path: [{ key: 'email' }] }]

    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            statusCode: 409
            statusMessage: Email already registered

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
